name: Release

# Triggers:
#   1. Automatic: push of a v*.*.* tag (e.g. git tag v1.2.3 && git push --tags)
#   2. Manual:    Actions -> Release -> Run workflow -> enter "v1.2.3"

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (include the v prefix, e.g. v1.1.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_suffix: linux-x86_64

          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            artifact_suffix: macos-arm64

          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            artifact_suffix: macos-x86_64

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_suffix: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      # Resolve version (works for both tag push and workflow_dispatch)
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW#v}"
          TAG="v${VERSION}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "TAG=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "TAG=${TAG}"         >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.name }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config dpkg-dev fakeroot

      - name: Build release binary
        run: cargo build --release --locked --bin alloy --target ${{ matrix.target }}

      # ---------------------------------------------------------------
      # LINUX ARTIFACTS
      # ---------------------------------------------------------------
      - name: Package Linux tar.gz
        if: runner.os == 'Linux'
        run: |
          STAGING="alloy-studio-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/alloy" "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          echo "TARBALL=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Build .deb package (Linux)
        if: runner.os == 'Linux'
        run: |
          DEB_ROOT="deb-root"
          DEB_NAME="alloy-studio_${VERSION}_amd64"
          mkdir -p "${DEB_ROOT}/DEBIAN" "${DEB_ROOT}/usr/bin" "${DEB_ROOT}/usr/share/doc/alloy-studio"
          cp "target/${{ matrix.target }}/release/alloy" "${DEB_ROOT}/usr/bin/alloy"
          chmod 0755 "${DEB_ROOT}/usr/bin/alloy"
          cp LICENSE "${DEB_ROOT}/usr/share/doc/alloy-studio/copyright" 2>/dev/null || \
            printf 'Copyright Alloy Studio Contributors. Apache-2.0.\n' \
              > "${DEB_ROOT}/usr/share/doc/alloy-studio/copyright"
          printf 'Package: alloy-studio\nVersion: %s\nArchitecture: amd64\nMaintainer: Alloy Studio Contributors <noreply@alloystudio.dev>\nDescription: GPU-accelerated FTC robotics code editor\n Alloy Studio is an AI-native code editor purpose-built for\n FIRST Tech Challenge robotics teams.\n' \
            "${VERSION}" > "${DEB_ROOT}/DEBIAN/control"
          dpkg-deb --build "$DEB_ROOT" "${DEB_NAME}.deb"
          echo "DEB_PKG=${DEB_NAME}.deb" >> "$GITHUB_ENV"

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          APP_DIR="AlloyStudio.AppDir"
          APPIMAGE_NAME="alloy-studio-${VERSION}-x86_64.AppImage"
          curl -sSL -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          mkdir -p "${APP_DIR}/usr/bin" "${APP_DIR}/usr/share/applications" \
            "${APP_DIR}/usr/share/icons/hicolor/256x256/apps"
          cp "target/${{ matrix.target }}/release/alloy" "${APP_DIR}/usr/bin/alloy"
          printf '[Desktop Entry]\nName=Alloy Studio\nExec=alloy\nIcon=alloy-studio\nType=Application\nCategories=Development;IDE;\nComment=FTC robotics code editor\n' \
            > "${APP_DIR}/alloy-studio.desktop"
          cp "${APP_DIR}/alloy-studio.desktop" \
            "${APP_DIR}/usr/share/applications/alloy-studio.desktop"
          python3 -c "import struct,zlib; c=lambda t,d: struct.pack('>I',len(d))+t+d+struct.pack('>I',zlib.crc32(t+d)&0xffffffff); h=struct.pack('>IIBBBBB',1,1,8,2,0,0,0); open('${APP_DIR}/alloy-studio.png','wb').write(b'\x89PNG\r\n\x1a\n'+c(b'IHDR',h)+c(b'IDAT',zlib.compress(b'\x00\xff\xff\xff'))+c(b'IEND',b''))"
          cp "${APP_DIR}/alloy-studio.png" \
            "${APP_DIR}/usr/share/icons/hicolor/256x256/apps/alloy-studio.png"
          printf '#!/bin/sh\nexec "$(dirname "$0")/usr/bin/alloy" "$@"\n' > "${APP_DIR}/AppRun"
          chmod +x "${APP_DIR}/AppRun"
          ARCH=x86_64 ./appimagetool "${APP_DIR}" "${APPIMAGE_NAME}" || true
          echo "APPIMAGE=${APPIMAGE_NAME}" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------
      # MACOS ARTIFACTS
      # ---------------------------------------------------------------
      - name: Package macOS tar.gz
        if: runner.os == 'macOS'
        run: |
          STAGING="alloy-studio-${VERSION}-${{ matrix.artifact_suffix }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/alloy" "$STAGING/"
          cp README.md LICENSE "$STAGING/" 2>/dev/null || true
          tar -czf "${STAGING}.tar.gz" "$STAGING"
          echo "TARBALL=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Build macOS .dmg
        if: runner.os == 'macOS'
        run: |
          APP_BUNDLE="AlloyStudio.app"
          DMG_NAME="alloy-studio-${VERSION}-${{ matrix.artifact_suffix }}.dmg"
          DMG_STAGING="dmg-staging"
          mkdir -p "${APP_BUNDLE}/Contents/MacOS" "${APP_BUNDLE}/Contents/Resources"
          cp "target/${{ matrix.target }}/release/alloy" "${APP_BUNDLE}/Contents/MacOS/alloy"
          chmod +x "${APP_BUNDLE}/Contents/MacOS/alloy"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n  <key>CFBundleName</key>              <string>Alloy Studio</string>\n  <key>CFBundleDisplayName</key>       <string>Alloy Studio</string>\n  <key>CFBundleIdentifier</key>        <string>dev.alloystudio.alloy</string>\n  <key>CFBundleVersion</key>           <string>%s</string>\n  <key>CFBundleShortVersionString</key><string>%s</string>\n  <key>CFBundleExecutable</key>        <string>alloy</string>\n  <key>CFBundlePackageType</key>       <string>APPL</string>\n  <key>LSMinimumSystemVersion</key>    <string>12.0</string>\n  <key>NSHighResolutionCapable</key>   <true/>\n</dict>\n</plist>\n' \
            "${VERSION}" "${VERSION}" > "${APP_BUNDLE}/Contents/Info.plist"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP_BUNDLE" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create \
            -volname "Alloy Studio ${VERSION}" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"
          echo "DMG=${DMG_NAME}" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------
      # WINDOWS ARTIFACTS
      # ---------------------------------------------------------------
      - name: Package Windows .zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.VERSION }}"
          $staging = "alloy-studio-$version-${{ matrix.artifact_suffix }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\alloy.exe" "$staging\"
          if (Test-Path "README.md") { Copy-Item "README.md" "$staging\" }
          if (Test-Path "LICENSE")   { Copy-Item "LICENSE"   "$staging\" }
          Compress-Archive -Path "$staging\*" -DestinationPath "$staging.zip"
          "ZIP=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ---------------------------------------------------------------
      # UPLOAD TO GITHUB RELEASE
      # tag_name is explicit so workflow_dispatch can create the tag too
      # ---------------------------------------------------------------
      - name: Upload Linux artifacts
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "Alloy Studio ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ env.TARBALL }}
            ${{ env.DEB_PKG }}
            ${{ env.APPIMAGE }}

      - name: Upload macOS artifacts
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "Alloy Studio ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ env.TARBALL }}
            ${{ env.DMG }}

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "Alloy Studio ${{ steps.ver.outputs.VERSION }}"
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ env.ZIP }}
