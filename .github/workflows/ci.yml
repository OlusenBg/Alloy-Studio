name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format + Clippy + Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libssl-dev pkg-config \
            libgtk-3-dev libglib2.0-dev libatk1.0-dev \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2-dev \
            libgdk-pixbuf-2.0-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev wayland-protocols libx11-dev libxi-dev \
            libxcursor-dev libxrandr-dev libxext-dev libxfixes-dev \
            libx11-xcb-dev libvulkan-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --exclude alloy-ui --all-targets -- -D clippy::all -A clippy::too_many_arguments

      - name: Clippy (alloy-ui — UI crate, warnings only)
        run: RUSTFLAGS="" cargo clippy -p alloy-ui -- -A clippy::all

      - name: Build alloy-ui (warnings allowed)
        run: RUSTFLAGS="" cargo build -p alloy-ui

      - name: Test
        run: cargo test --workspace --exclude alloy-ui --locked
